<!DOCTYPE html>
<html lang="pt_BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sorteio</title>
    </head>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            position: relative;
        }   
        .quadro1 {
            position: absolute;
            top: 10px;
            left: 10px;
        }
        .quadro2 {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .quadro1 img, .quadro2 img {
            width: 100px;
            height: auto;
        }
        .card{
            background:white;
            padding:30px;
            border-radius:20px;
            width:450px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }
        input {
            width:100%;
            padding:12px;
            margin:8px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }
        button {
            width:100%;
            padding:12px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }
    </style>
    <body>
        <div class="quadro1">
            <img src="imagens/01.png" alt="">
        </div>
        <div class="quadro2">
            <img src="imagens/02.png" alt="">
        </div>
        <div class="card">
            <h2>🎁 Cadastro de Sorteio SME/PMV 🎁</h2>

            <input id="nome" placeholder="Nome">
            <input id="telefone_whats" placeholder="(81)9XXXXXXXX">
            <input id="cpf" placeholder="xxx.xxx.xxx-xx">
            <input list="lista-escolas" id="escola" placeholder="Clique para Selecionar a Escola">

            <datalist id="lista-escolas">
                <option value="Escola Municipal em Tempo Integral Napoleão Xavier">
                <option value="Escola Municipal Luiz Maranhão">
                <option value="Escola Municipal em Tempo Integral Comunidade Cristã">
                <option value="Escola Municipal Jacy Estelita">
                <option value="Escola Municipal Maria de Lourdes Moura Pedrosa">
                <option value="Escola Municipal José Rufino">
                <option value="Escola Municipal Dr. Benjamin Azevedo">
                <option value="Escola Municipal José Antônio P. Guerra">
                <option value="Grupo Escolar Carlos Pessoa Guerra">
                <option value="Escola Municipal Maria José Monteiro">
                <option value="Escola Municipal Hemetério Guedes">
                <option value="Centro Municipal de Educação Infantil Afrânio Samuel de Oliveira Nunes">
            </datalist>

            <button onclick="cadastrar()">Participar</button>
        </div>
        <script>
            const escolas = [
                    "Escola Municipal em Tempo Integral Napoleão Xavier", //0
                    "Escola Municipal Luiz Maranhão", //1
                    "Escola Municipal em Tempo Integral Comunidade Cristã", //2
                    "Escola Municipal Jacy Estelita", //3
                    "Escola Municipal Maria de Lourdes Moura Pedrosa", //4
                    "Escola Municipal José Rufino", //5
                    "Escola Municipal Dr. Benjamin Azevedo", //6
                    "Escola Municipal José Antônio P. Guerra", //7
                    "Grupo Escolar Carlos Pessoa Guerra", //8
                    "Escola Municipal Maria José Monteiro", //9
                    "Escola Municipal Hemetério Guedes", //10
                    "Centro Municipal de Educação Infantil Afrânio Samuel de Oliveira Nunes" //11
                ];

            
        </script>
        <script type="module">

            async function cadastrar() {

                const escolas = [
                    "Escola Municipal em Tempo Integral Napoleão Xavier",
                    "Escola Municipal Luiz Maranhão",
                    "Escola Municipal em Tempo Integral Comunidade Cristã",
                    "Escola Municipal Jacy Estelita",
                    "Escola Municipal Maria de Lourdes Moura Pedrosa",
                    "Escola Municipal José Rufino",
                    "Escola Municipal Dr. Benjamin Azevedo",
                    "Escola Municipal José Antônio P. Guerra",
                    "Grupo Escolar Carlos Pessoa Guerra",
                    "Escola Municipal Maria José Monteiro",
                    "Escola Municipal Hemetério Guedes",
                    "Centro Municipal de Educação Infantil Afrânio Samuel de Oliveira Nunes"
                ];

                let nome =
                     document.getElementById("nome")
                    .value.trim();

                let telefone =
                    document.getElementById("telefone_whats")
                    .value.trim();

                let cpf =
                    document.getElementById("cpf")
                    .value.trim();

                let escolaNome =
                    document.getElementById("escola")
                    .value.trim();

                if(
                   !nome ||
                   !telefone ||
                   !cpf ||
                   !escolaNome
                ){
                   alert("⚠️ Preencha todos os campos!");
                   return;
                }

                const cpfLimpo =
                  cpf.replace(/\D/g, "");

                  if(cpfLimpo.length !== 11){
                        alert("⚠️ CPF inválido!");
                        return;
                    }

                const escolaIndex =
                      escolas.indexOf(escolaNome);

                    if(escolaIndex === -1){
                        alert("⚠️ Selecione uma escola válida!");
                        return;
                    }

                    try {
                        const snapshot = await get(
                            child(
                                ref(db),
                                cpfLimpo
                            )
                        );

                        if(snapshot.exists()){
                            alert(
                            "❌ CPF já cadastrado!"
                            );
                            return;
                        }
                        await set(
                            ref(db, cpfLimpo),
                            {
                                cpf: cpf,
                                escola: escolaIndex,
                                nome: nome.toLowerCase(),
                                telefone: telefone
                            }
                        );

                        alert(
                        "✅ Participante cadastrado!"
                        );
                        document
                            .getElementById("nome")
                            .value = "";

                        document
                            .getElementById("telefone_whats")
                            .value = "";

                        document
                            .getElementById("cpf")
                            .value = "";

                        document
                            .getElementById("escola")
                            .value = "";

                    } catch(error){

                        console.error(error);

                        alert(
                        "Erro ao salvar no Firebase"
                        );
                    }
            }

            window.cadastrar = cadastrar;

        </script>
        <script type="module">
            import { initializeApp } from
              "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
                import {
                    getDatabase,
                    ref,
                    set,
                    get,
                    child
                } from
                        "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

                        const firebaseConfig = {

                            apiKey: "SUA_API_KEY",

                            authDomain:
                            "SEU-PROJETO.firebaseapp.com",

                            databaseURL:
                            "https://SEU-PROJETO-default-rtdb.firebaseio.com",

                            projectId: "SEU-PROJETO",

                            storageBucket:
                            "SEU-PROJETO.appspot.com",

                            messagingSenderId: "123456",

                            appId: "APP_ID"
                        };

                        const app = initializeApp(firebaseConfig);
                        const db = getDatabase(app);
                            
        </script>        
    </body>
</html>
